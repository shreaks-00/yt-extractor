services:
  - type: web
    name: yt-extractor-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: "https://yt-extractor-3.vercel.app" # Frontend URL (locked down)
